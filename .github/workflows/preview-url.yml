name: Preview URL Message

on:
  push:
    branches:
      - '**'

jobs:
  preview-url-message:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Post preview deployment URL
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const sanitizedBranch = branch.toLowerCase().replace(/[^a-z0-9]/g, '-');
            const url = `https://${sanitizedBranch}-pulso-urbano.fjararibet.workers.dev`;

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `🚀 Preview deployment: ${url}`
            });
